version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: hrms_postgres
    restart: always
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: hrms_api
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  postgres_data: